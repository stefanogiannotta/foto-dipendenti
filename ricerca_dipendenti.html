<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto Dipendenti</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #F5F2EE;
    --surface: #FFFFFF;
    --ink: #1A1714;
    --ink-soft: #6B6560;
    --accent: #C4622D;
    --accent-light: #F0E0D6;
    --border: #E2DDD8;
    --shadow: 0 2px 16px rgba(26,23,20,0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }
  header { text-align: center; margin-bottom: 40px; }
  header .eyebrow {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400; line-height: 1.15; color: var(--ink);
  }
  header p { margin-top: 10px; color: var(--ink-soft); font-size: 15px; font-weight: 300; }
  #login-screen { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; }
  #login-screen p { color: var(--ink-soft); font-size: 15px; text-align: center; max-width: 340px; line-height: 1.6; }
  #login-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 28px; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: 999px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    color: var(--ink); cursor: pointer; box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  #login-btn:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light), var(--shadow); transform: translateY(-2px); }
  #login-btn svg { width: 20px; height: 20px; }
  #app-screen { display: none; width: 100%; align-items: center; flex-direction: column; }
  #logout-btn {
    position: fixed; top: 16px; right: 20px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--ink-soft); background: none;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #logout-btn:hover { color: var(--accent); border-color: var(--accent); }
  .search-wrap { width: 100%; max-width: 520px; position: relative; margin-bottom: 44px; }
  .search-wrap svg.icon-search {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    color: var(--ink-soft); pointer-events: none; width: 18px; height: 18px;
  }
  #search {
    width: 100%; padding: 16px 18px 16px 48px;
    font-family: 'DM Sans', sans-serif; font-size: 16px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 999px; outline: none; color: var(--ink);
    box-shadow: var(--shadow); transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light), var(--shadow); }
  #search::placeholder { color: #B0A89F; }
  #grid { width: 100%; max-width: 820px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
  .card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border);
    transition: transform 0.18s, box-shadow 0.18s; animation: fadeUp 0.3s ease both;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(26,23,20,0.13); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--accent-light); }
  .card-name { padding: 10px 12px 12px; font-size: 13.5px; font-weight: 500; color: var(--ink); text-align: center; line-height: 1.35; }
  #status { text-align: center; color: var(--ink-soft); font-size: 14px; margin-top: 24px; grid-column: 1/-1; min-height: 40px; }
  #status .big { font-size: 32px; display: block; margin-bottom: 8px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 60px; font-size: 12px; color: #BDB5AF; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Risorse umane</div>
  <h1>Foto Dipendenti</h1>
  <p>Cerca per nome o cognome</p>
</header>

<div id="login-screen">
  <p>Accedi con il tuo account aziendale Google per visualizzare le foto dei dipendenti.</p>
  <button id="login-btn" onclick="signIn()">
    <svg viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Accedi con Google
  </button>
</div>

<div id="app-screen">
  <button id="logout-btn" onclick="signOut()">Esci</button>
  <div class="search-wrap">
    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search" placeholder="es. Mario Rossi..." autocomplete="off" spellcheck="false">
  </div>
  <div id="grid">
    <div id="status"><div class="spinner"></div>Caricamento foto...</div>
  </div>
</div>

<footer>Foto dipendenti &middot; uso interno</footer>

<script>
var CLIENT_ID = "302721907131-ern7a1if1n4pjpjdo9k36k20nkk8jmm9.apps.googleusercontent.com";
var FOLDER_ID = "1Wmu1mZFr97ufc_V1R94VGmxeEHMafTBO";
var DRIVE_API = "https://www.googleapis.com/drive/v3";
var SCOPE = "https://www.googleapis.com/auth/drive.readonly";
var accessToken = null;
var allFiles = [];
var tokenClient = null;

window.onload = function() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: function(resp) {
      if (resp.error) { alert("Errore di accesso: " + resp.error); return; }
      accessToken = resp.access_token;
      showApp();
      loadFiles();
    }
  });
};

function signIn() {
  tokenClient.requestAccessToken({ prompt: "consent" });
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, function() {
    accessToken = null;
    allFiles = [];
    document.getElementById("app-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("search").value = "";
  });
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "flex";
}

function toDisplayName(filename) {
  return filename
    .replace(/\.[^.]+$/, "")
    .replace(/[_\-]/g, " ")
    .split(" ")
    .map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); })
    .join(" ");
}

function setStatus(html) {
  document.getElementById("status").innerHTML = html;
}

function loadFiles() {
  setStatus('<div class="spinner"></div>Caricamento foto...');
  fetch(DRIVE_API + "/files?q=" + encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/' and trashed = false") + "&fields=files(id,name)&pageSize=200", {
    headers: { Authorization: "Bearer " + accessToken }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) { setStatus("<span class='big'>⚠️</span>Errore: " + data.error.message); return; }
    allFiles = (data.files || []).map(function(f) {
      return { id: f.id, name: f.name, displayName: toDisplayName(f.name) };
    });
    renderCards(allFiles);
  })
  .catch(function(e) {
    setStatus("<span class='big'>⚠️</span>Errore di rete: " + e.message);
  });
}

function renderCards(files) {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (files.length === 0) {
    setStatus("<span class='big'>🔍</span>Nessun dipendente trovato.");
    return;
  }
  files.forEach(function(f, i) {
    var card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (Math.min(i * 30, 300)) + "ms";

    var img = document.createElement("img");
    img.alt = f.displayName;
    img.loading = "lazy";
    img.src = DRIVE_API + "/files/" + f.id + "?alt=media&access_token=" + accessToken;
    img.onerror = function() {
      img.src = "https://drive.google.com/thumbnail?id=" + f.id + "&sz=w400";
      img.onerror = null;
    };

    var label = document.createElement("div");
    label.className = "card-name";
    label.textContent = f.displayName;

    card.appendChild(img);
    card.appendChild(label);
    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", function(e) {
  var q = e.target.value.trim().toLowerCase();
  if (!q) { renderCards(allFiles); return; }
  renderCards(allFiles.filter(function(f) {
    return f.displayName.toLowerCase().indexOf(q) !== -1;
  }));
});
</script>

</body>
</html>
