<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repository Foto Dipendenti – TESISQUARE</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --blue-dark: #1E5FAA;
    --blue-mid: #1E7CC8;
    --blue-light: #00AEEF;
    --grad: linear-gradient(135deg, #1E5FAA 0%, #00AEEF 100%);
    --white: #FFFFFF;
    --bg: #F4F7FC;
    --surface: #FFFFFF;
    --ink: #1A2333;
    --ink-soft: #5A6A80;
    --border: #DDE4EE;
    --shadow: 0 2px 16px rgba(30,95,170,0.10);
    --shadow-lg: 0 8px 32px rgba(30,95,170,0.16);
    --radius: 12px;
    --radius-lg: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Roboto", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(30,95,170,0.07);
  }
  .header-logos {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-logos img.logo-tesi {
    height: 68px;
    width: auto;
  }
  .header-divider {
    width: 1px;
    height: 56px;
    background: var(--border);
  }
  .header-logos img.logo-hr {
    height: 72px;
    width: auto;
  }
  #logout-btn {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    background: none;
    border: 1.5px solid var(--blue-mid);
    border-radius: 999px;
    font-family: "Roboto", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue-mid);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  #logout-btn:hover { background: var(--blue-mid); color: var(--white); }
  #logout-btn.visible { display: flex; }

  /* ── HERO BAND ── */
  .hero {
    background: var(--grad);
    padding: 32px 24px 28px;
    text-align: center;
    color: var(--white);
  }
  .hero h1 {
    font-family: "Roboto Condensed", sans-serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .hero p {
    font-size: 14px;
    font-weight: 300;
    opacity: 0.88;
    margin-bottom: 20px;
  }
  .hero-sub {
    display: block;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 300;
    letter-spacing: 0.25em;
    opacity: 0.9;
    margin-top: 4px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
  }
  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-soft);
    width: 18px; height: 18px;
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 14px 16px 14px 46px;
    font-family: "Roboto", sans-serif;
    font-size: 15px;
    background: var(--white);
    border: none;
    border-radius: 999px;
    outline: none;
    color: var(--ink);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  #search::placeholder { color: #AAB4C4; }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1;
    padding: 28px 16px 48px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── STATUS ── */
  #status {
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    padding: 32px 0;
    width: 100%;
  }
  #status .big { font-size: 36px; display: block; margin-bottom: 10px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--blue-mid);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    text-align: center;
    gap: 8px;
  }
  .login-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .login-card img { height: 64px; }
  .login-card h2 {
    font-family: "Roboto Condensed", sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }
  .login-card p {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 300px;
  }
  #login-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 28px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-family: "Roboto", sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    margin-top: 8px;
    width: 100%;
    justify-content: center;
  }
  #login-btn:hover {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(30,124,200,0.12), var(--shadow);
    transform: translateY(-1px);
  }
  #login-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .remember-note {
    font-size: 12px;
    color: var(--ink-soft);
    opacity: 0.7;
    margin-top: 4px;
  }

  /* ── APP SCREEN ── */
  #app-screen { display: none; }
  #app-screen.visible { display: block; }

  /* ── GRID ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }
  @media (max-width: 480px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    animation: fadeUp 0.3s ease both;
  }
  .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .card:active { transform: scale(0.97); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .card img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    display: block;
    background: var(--bg);
  }
  .card-name {
    padding: 8px 10px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    line-height: 1.3;
  }

  /* ── RESULTS COUNT ── */
  #results-count {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 16px;
    padding-left: 2px;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,20,40,0.94);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  #lightbox.open { display: flex; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  #lightbox-img {
    max-width: min(88vw, 480px);
    max-height: 65vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    object-fit: contain;
    background: #1a2333;
  }
  #lightbox-name {
    color: #FFF;
    font-family: "Roboto Condensed", sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.02em;
  }
  #lightbox-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  #lightbox-download {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 22px;
    background: var(--grad);
    color: #fff; border: none; border-radius: 999px;
    font-family: "Roboto", sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; text-decoration: none;
    box-shadow: 0 4px 14px rgba(30,95,170,0.35);
    transition: opacity 0.2s, transform 0.15s;
  }
  #lightbox-download:hover { opacity: 0.9; transform: translateY(-1px); }
  #lightbox-close {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 22px;
    background: rgba(255,255,255,0.1); color: #fff;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 999px;
    font-family: "Roboto", sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  #lightbox-close:hover { background: rgba(255,255,255,0.2); }

  /* ── FOOTER ── */
  .site-footer {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }
</style>
</head>

// ── Gestione token persistente ────────────────────────────────
function saveToken(token) {
  try {
    sessionStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(TOKEN_EXP_KEY, Date.now() + TOKEN_TTL);
  } catch(e) {}
}

function loadSavedToken() {
  try {
    var exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || "0");
    if (Date.now() < exp) {
      return localStorage.getItem(TOKEN_KEY);
    }
  } catch(e) {}
  return null;
}

function clearToken() {
  try {
    sessionStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_EXP_KEY);
  } catch(e) {}
}

  });

  // Prova login automatico con token salvato
  var saved = loadSavedToken();
  if (saved) {
    accessToken = saved;
    // Verifica che il token sia ancora valido
    fetch(DRIVE_API + "/files?pageSize=1&fields=files(id)", {
      headers: { Authorization: "Bearer " + accessToken }
    }).then(function(r) {
      if (r.ok) {
        showApp();
        loadAllFiles();
      } else {
        clearToken();
        accessToken = null;
      }
    }).catch(function() { clearToken(); accessToken = null; });
  }

  document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target === this) closeLightbox();
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeLightbox();
  });
};

function signIn() {
  tokenClient.requestAccessToken({ prompt: "consent" });
}

function signOut() {
  clearToken();
  if (accessToken) {
    try { google.accounts.oauth2.revoke(accessToken, function(){}); } catch(e){}
  }
  accessToken = null; allFiles = [];
  document.getElementById("app-screen").classList.remove("visible");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("logout-btn").classList.remove("visible");
  document.getElementById("search").value = "";
  document.getElementById("grid").innerHTML = "";
  document.getElementById("results-count").textContent = "";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").classList.add("visible");
  document.getElementById("logout-btn").classList.add("visible");
}

function toDisplayName(filename) {
  return filename.replace(/\.[^.]+$/, "").replace(/[_\-]/g, " ")
    .split(" ").map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(" ");
}

function setStatus(html) {
  var el = document.getElementById("status");
  if (el) el.innerHTML = html;
}

// ── Carica TUTTE le foto (paginazione automatica) ─────────────
function loadAllFiles() {
  setStatus('<div class="spinner"></div>Caricamento foto...');
  allFiles = [];
  loadPage(null);
}

function loadPage(pageToken) {
  var url = DRIVE_API + "/files"
    + "?q=" + encodeURIComponent("'" + FOLDER_ID + "' in parents and mimeType contains 'image/' and trashed = false")
    + "&fields=nextPageToken,files(id,name)"
    + "&pageSize=100&includeItemsFromAllDrives=true&supportsAllDrives=true";
  if (pageToken) url += "&pageToken=" + encodeURIComponent(pageToken);

  fetch(url, { headers: { Authorization: "Bearer " + accessToken } })
    .then(function(res) {
      if (res.status === 401) { clearToken(); signOut(); return null; }
      return res.json();
    })
    .then(function(data) {
      if (!data) return;
      if (data.error) { setStatus("<span class='big'>⚠️</span>Errore: " + data.error.message); return; }
      allFiles = allFiles.concat((data.files || []).map(function(f) {
        return { id: f.id, name: f.name, displayName: toDisplayName(f.name) };
      }));
      if (data.nextPageToken) {
        setStatus('<div class="spinner"></div>Caricamento foto... (' + allFiles.length + ' trovate)');
        loadPage(data.nextPageToken);
      } else {
        setStatus("");
        if (allFiles.length === 0) {
          setStatus("<span class='big'>📂</span>Nessuna foto trovata.");
        } else {
          renderCards(allFiles);
        }
      }
    })
    .catch(function(e) { setStatus("<span class='big'>⚠️</span>Errore: " + e.message); });
}

function renderCards(files) {
  var grid = document.getElementById("grid");
  var count = document.getElementById("results-count");
  grid.innerHTML = "";
  if (files.length === 0) {
    setStatus("<span class='big'>🔍</span>Nessun dipendente trovato.");
    count.textContent = "";
    return;
  }
  setStatus("");
  count.textContent = files.length + (files.length === allFiles.length ? " dipendenti" : " risultati su " + allFiles.length);

  files.forEach(function(f, i) {
    var card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = Math.min(i * 20, 400) + "ms";
    card.onclick = function() { openLightbox(f); };

    var img = document.createElement("img");
    img.alt = f.displayName; img.loading = "lazy";
    img.src = "https://drive.google.com/thumbnail?id=" + f.id + "&sz=w300&access_token=" + accessToken;
    img.onerror = function() {
      img.src = DRIVE_API + "/files/" + f.id + "?alt=media&access_token=" + accessToken;
      img.onerror = null;
    };

    var label = document.createElement("div");
    label.className = "card-name";
    label.textContent = f.displayName;
    card.appendChild(img); card.appendChild(label); grid.appendChild(card);
  });
}

function openLightbox(f) {
  var lb = document.getElementById("lightbox");
  var img = document.getElementById("lightbox-img");
  document.getElementById("lightbox-name").textContent = f.displayName;
  document.getElementById("lightbox-download").href = "https://drive.google.com/file/d/" + f.id + "/view";
  img.src = "https://drive.google.com/thumbnail?id=" + f.id + "&sz=w1200&access_token=" + accessToken;
  img.onerror = function() {
    img.src = DRIVE_API + "/files/" + f.id + "?alt=media&access_token=" + accessToken;
    img.onerror = null;
  };
  lb.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lightbox-img").src = "";
  document.body.style.overflow = "";
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("search").addEventListener("input", function(e) {
    var q = e.target.value.trim().toLowerCase();
    if (!q) { renderCards(allFiles); return; }
    renderCards(allFiles.filter(function(f) { return f.displayName.toLowerCase().indexOf(q) !== -1; }));
  });
});
</script>
</body>
</html>
